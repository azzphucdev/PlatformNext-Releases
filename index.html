<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Platform Next — Releases</title>
    <meta
      name="description"
      content="Platform Next — Cross-Platform Multi-Protocol Proxy Frontend. Releases &amp; downloads."
    />
    <!-- Force to the GitHub repo (renders the README). Change TARGET below to platformnext.dev if you prefer the site. -->
    <meta
      http-equiv="refresh"
      content="0; url=https://github.com/azzphucdev/PlatformNext-Releases#readme"
    />
    <link rel="canonical" href="https://github.com/azzphucdev/PlatformNext-Releases" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        background: #0b0d12;
        color: #e8eaf0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      p.sub {
        margin: 0 0 22px;
        color: #9aa3b2;
        font-size: 14px;
      }
      .spinner {
        width: 30px;
        height: 30px;
        margin: 0 auto 22px;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      a.btn {
        display: inline-block;
        padding: 11px 20px;
        border-radius: 999px;
        background: #6366f1;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
      }
      a.btn:hover {
        background: #545bec;
      }
    </style>
    <script>
      // JS redirect (faster than meta-refresh; keeps a manual fallback below).
      var TARGET = "https://github.com/azzphucdev/PlatformNext-Releases#readme";
      location.replace(TARGET);
    </script>
  </head>
  <body>
    <main>
      <div class="spinner"></div>
      <h1>Platform Next</h1>
      <p class="sub">Redirecting to the release page…</p>
      <a class="btn" href="https://github.com/azzphucdev/PlatformNext-Releases#readme"
        >Open on GitHub →</a
      >
    </main>
  </body>
</html>
